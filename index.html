<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Cards Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 min-h-screen">
    <div class="flex flex-col gap-10 items-center py-10">

    <h1 class="text-4xl font-bold text-white mb-5">User Cards Gallery</h1>

    <input 
        class="inp px-5 py-3 rounded-lg outline-none bg-gray-800 text-gray-300 placeholder-gray-500 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 transition duration-300 w-80"
        type="text" 
        placeholder="Search users..."
    >

    <div class="cards flex flex-wrap gap-5 justify-centerzzz">

       
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 max-w-md w-full mx-4 relative">
            <button id="close-modal" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700 dark:text-gray-300 dark:hover:text-white">
                <i class="fas fa-times"></i>
            </button>
            <img id="modal-img" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover" src="" alt="">
            <h2 id="modal-name" class="text-2xl font-bold text-center mb-2"></h2>
            <p id="modal-age" class="text-center text-gray-500 dark:text-gray-400 mb-1"></p>
            <p id="modal-location" class="text-center text-gray-500 dark:text-gray-400 mb-2"></p>
            <p id="modal-bio" class="text-center text-gray-600 dark:text-gray-300 mb-3"></p>
            <div id="modal-interests" class="flex flex-wrap justify-center gap-2"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
</body>
</html>
